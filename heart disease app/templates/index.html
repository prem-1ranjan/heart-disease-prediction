<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Predictor</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { color: #e74c3c; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 20px; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; font-size: 18px; text-align: center; }
        .danger { background: #ffebee; color: #e74c3c; }
        .safe { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <h1> Heart Disease Predictor</h1>
    <form action="/predict" method="POST">

        <label>Age</label>
        <input type="number" name="Age" placeholder="e.g. 45" required>

        <label>Resting Blood Pressure</label>
        <input type="number" name="RestingBP" placeholder="e.g. 120" required>

        <label>Cholesterol</label>
        <input type="number" name="Cholesterol" placeholder="e.g. 200" required>

        <label>Fasting Blood Sugar > 120 (1=Yes, 0=No)</label>
        <input type="number" name="FastingBS" placeholder="1 or 0" required>

        <label>Max Heart Rate</label>
        <input type="number" name="MaxHR" placeholder="e.g. 150" required>

        <label>Oldpeak (ST Depression)</label>
        <input type="number" name="Oldpeak" step="0.1" placeholder="e.g. 1.5" required>

        <label>Sex</label>
        <select name="Sex_M">
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select>

        <label>Chest Pain Type</label>
        <select name="ChestPainType">
            <option value="ATA">ATA</option>
            <option value="NAP">NAP</option>
            <option value="TA">TA</option>
            <option value="ASY">ASY</option>
        </select>

        <label>Resting ECG</label>
        <select name="RestingECG">
            <option value="Normal">Normal</option>
            <option value="ST">ST</option>
            <option value="LVH">LVH</option>
        </select>

        <label>Exercise Angina</label>
        <select name="ExerciseAngina">
            <option value="N">No</option>
            <option value="Y">Yes</option>
        </select>

        <label>ST Slope</label>
        <select name="ST_Slope">
            <option value="Up">Up</option>
            <option value="Flat">Flat</option>
            <option value="Down">Down</option>
        </select>

        <button type="submit">Predict </button>
    </form>

    {% if prediction is not none %}
    <div class="result {{ 'danger' if prediction == 1 else 'safe' }}">
        {% if prediction == 1 %}
             Heart Disease Detected!
        {% else %}
            No Heart Disease Detected!
        {% endif %}
    </div>
    {% endif %}
</body>
</html>
